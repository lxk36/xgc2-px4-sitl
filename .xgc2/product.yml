schema: xgc2.product.v1
id: xgc2-px4-sitl-116
name: XGC2 PX4 SITL 1.16
version: 1.16.2-11
kind: ros2-apt
summary: PX4 v1.16 SITL runtime and Gazebo Sim Harmonic assets for ROS Jazzy.
ros:
  distro: jazzy
  packages:
  - px4_sitl_runtime_1_16
  - px4_gz_sim_1_16
apt:
  distribution: noble
  install:
  - ros-jazzy-xgc2-gz-harmonic-px4-1-16
  packages:
  - ros-jazzy-xgc2-px4-sitl-1-16
  - ros-jazzy-xgc2-gz-harmonic-px4-1-16
  depends:
  - ros-jazzy-xgc2-px4-sitl-1-16 (>= 1.16.2-8)
  - gz-harmonic
usage:
  install: 'sudo apt update

    sudo apt install ros-jazzy-xgc2-gz-harmonic-px4-1-16

    '
  smoke_test: 'ros2 pkg prefix px4_gz_sim_1_16

    '
  notes: 'Runtime entry scripts are installed from package scripts; packaging scripts
    stay under .xgc2/scripts.

    '
ownership:
  paths:
  - /opt/ros/jazzy/share/px4_sitl_runtime_1_16
  - /opt/ros/jazzy/share/px4_gz_sim_1_16
  - /opt/ros/jazzy/lib/px4_sitl_runtime_1_16
  - /opt/ros/jazzy/lib/px4_gz_sim_1_16
release:
  repository: lxk36/xgc2-px4-sitl
  ref: v1.16-jazzy
  workflow: release.yml
  apt_versions:
    noble: 1.16.2-11
