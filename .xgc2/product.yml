schema: xgc2.product.v1
id: xgc2-px4-sitl-112
name: XGC2 PX4 SITL 1.12
version: 1.12.3-16
kind: ros1-apt
summary: PX4 v1.12 SITL runtime and Gazebo Classic assets for ROS Noetic.
ros:
  distro: noetic
  packages:
  - px4_sitl_1_12
  - gazebo_sim_px4_1_12
apt:
  distribution: focal
  install:
  - ros-noetic-xgc2-gazebo-sim-px4-1-12
  packages:
  - ros-noetic-xgc2-px4-sitl-1-12
  - ros-noetic-xgc2-gazebo-sim-px4-1-12
  depends:
  - ros-noetic-xgc2-px4-sitl-1-12 (>= 1.12.3-16)
  - gazebo11
  - ros-noetic-gazebo-ros
  - ros-noetic-mavros
usage:
  install: 'sudo apt update

    sudo apt install ros-noetic-xgc2-gazebo-sim-px4-1-12

    '
  smoke_test: 'roslaunch --files gazebo_sim_px4_1_12 iris.launch

    '
  notes: 'Runtime entry scripts are installed from package scripts; packaging scripts
    stay under .xgc2/scripts.

    '
ownership:
  paths:
  - /opt/ros/noetic/share/px4_sitl_1_12
  - /opt/ros/noetic/share/gazebo_sim_px4_1_12
  - /opt/ros/noetic/lib/px4_sitl_1_12
  - /opt/ros/noetic/lib/gazebo_sim_px4_1_12
release:
  repository: lxk36/xgc2-px4-sitl
  ref: v1.12-noetic
  workflow: release.yml
