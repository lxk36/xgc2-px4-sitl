name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      publish_apt:
        description: Publish debs to the APT repository
        required: true
        type: boolean
        default: false
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        type: boolean
        default: false
      run_source_tests:
        description: Run source tests
        required: true
        type: boolean
        default: false
      release_id:
        description: Parent orchestrator run id used for correlation and audit.
        required: false
        default: ""
        type: string
      release_lock_digest:
        description: SHA256 of the immutable release lock.
        required: false
        default: ""
        type: string
      trusted_ci_run_id:
        description: Exact successful push CI run whose trusted deb artifacts may be reused
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Validate release inputs
        run: |
          set -euo pipefail
          product_version="$(awk -F': *' '/^version:[[:space:]]*/ {print $2; exit}' .xgc2/product.yml)"
          if [[ "${product_version}" != "${{ inputs.expected_version }}" ]]; then
            echo "product.yml version ${product_version} != expected_version ${{ inputs.expected_version }}" >&2
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${{ inputs.expected_source_sha }}" ]]; then
            echo "HEAD ${source_sha} != expected_source_sha ${{ inputs.expected_source_sha }}" >&2
            exit 1
          fi

  build:
    needs: release-guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Download trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.trusted_ci_run_id }}
          name: px4-sitl-runtime-debs-v1.12-noetic-${{ matrix.arch }}
          path: .ci/trusted

      - name: Verify and stage trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir .ci/trusted --deb-output-dir debs \
            --manifest-output-dir .ci/build-manifests \
            --product xgc2-px4-sitl-112 --distribution focal \
            --architecture "${{ matrix.arch }}" --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "${{ inputs.trusted_ci_run_id }}"

      - name: Build and install-check runtime packages in Docker
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          .xgc2/scripts/build_runtime_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/px4-runtime-work-v1.12-noetic-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create fallback build manifest
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs --output-dir .ci/build-manifests \
            --product xgc2-px4-sitl-112 --product-version "${{ inputs.expected_version }}" \
            --distribution focal --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: px4-sitl-runtime-debs-v1.12-noetic-${{ matrix.arch }}
          path: |
            debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

  publish-apt:
    if: ${{ inputs.publish_apt }}
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: xgc2-apt-focal
      cancel-in-progress: false
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: px4-sitl-runtime-debs-v1.12-noetic-*
          path: release-input
      - name: Validate all architectures and create release manifests
        run: |
          for arch in amd64 arm64; do
            python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
              --artifact-dir release-input --deb-output-dir staged/debs \
              --manifest-output-dir staged/build-manifests \
              --product xgc2-px4-sitl-112 --distribution focal \
              --architecture "$arch" --source-sha "${{ inputs.expected_source_sha }}"
          done
          python3 .xgc2/scripts/xgc2_artifact_manifest.py release \
            --deb-dir staged/debs --build-manifest-dir staged/build-manifests \
            --publish-dir publish --product xgc2-px4-sitl-112 \
            --product-version "${{ inputs.expected_version }}" --distribution focal \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id || github.run_id }}" \
            --release-lock-digest "${{ inputs.release_lock_digest }}" \
            --target-architecture amd64 --target-architecture arm64
      - name: Publish all architectures atomically
        run: .xgc2/scripts/publish_apt_repo.sh --deb-dir publish
