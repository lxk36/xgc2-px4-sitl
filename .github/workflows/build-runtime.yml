name: build-runtime

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      package_branch:
        description: Package branch to build
        required: true
        default: v1.12-noetic
        type: choice
        options:
          - v1.12-noetic
          - v1.14-noetic
          - v1.16-jazzy
  schedule:
    - cron: "17 3 * * 1"

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            branch='${{ inputs.package_branch }}'
            jq -nc --arg branch "$branch" '{include:[{branch:$branch,arch:"amd64",runner:"ubuntu-latest"},{branch:$branch,arch:"arm64",runner:"ubuntu-24.04-arm"}]}' > matrix.json
          else
            jq -nc '{include:[
              {branch:"v1.12-noetic",arch:"amd64",runner:"ubuntu-latest"},
              {branch:"v1.12-noetic",arch:"arm64",runner:"ubuntu-24.04-arm"},
              {branch:"v1.14-noetic",arch:"amd64",runner:"ubuntu-latest"},
              {branch:"v1.14-noetic",arch:"arm64",runner:"ubuntu-24.04-arm"},
              {branch:"v1.16-jazzy",arch:"amd64",runner:"ubuntu-latest"},
              {branch:"v1.16-jazzy",arch:"arm64",runner:"ubuntu-24.04-arm"}
            ]}' > matrix.json
          fi
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: select
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}

    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Build and install-check runtime packages in Docker
        run: |
          .xgc2/scripts/build_runtime_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/px4-runtime-work-${{ matrix.branch }}-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: px4-sitl-runtime-debs-${{ matrix.branch }}-${{ matrix.arch }}
          path: debs/*.deb

      - name: Publish to self-hosted APT repository
        if: ${{ env.APT_REPO_HOST != '' && env.APT_REPO_SSH_KEY != '' && env.APT_REPO_KNOWN_HOSTS != '' }}
        run: .xgc2/scripts/publish_apt_repo.sh --deb-dir debs
