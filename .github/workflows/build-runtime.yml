name: build-runtime

on:
  workflow_dispatch:
  push:
    branches:
      - v*-noetic
      - v*-jazzy
  schedule:
    - cron: "17 3 * * 1"

jobs:
  px4-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and install-check runtime package in Docker
        run: |
          scripts/build_runtime_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/px4-runtime-work" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: px4-sitl-runtime-debs
          path: debs/*.deb
