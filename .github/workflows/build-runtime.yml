name: build-runtime

on:
  workflow_dispatch:
  push:
    branches:
      - v*-noetic
      - v*-jazzy
  schedule:
    - cron: "17 3 * * 1"

jobs:
  px4-runtime:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and install-check runtime package in Docker
        run: |
          scripts/build_runtime_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/px4-runtime-work-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: px4-sitl-runtime-debs-${{ matrix.arch }}
          path: debs/*.deb

      - name: Publish to self-hosted APT repository
        if: ${{ env.APT_REPO_HOST != '' && env.APT_REPO_SSH_KEY != '' && env.APT_REPO_KNOWN_HOSTS != '' }}
        run: scripts/publish_apt_repo.sh --deb-dir debs
