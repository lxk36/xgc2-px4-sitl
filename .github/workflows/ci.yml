name: ci

on:
  push:
    branches:
      - v1.16-jazzy
  pull_request:
    branches:
      - v1.16-jazzy
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check runtime packages in Docker
        run: |
          .xgc2/scripts/build_runtime_deb_in_docker.sh \
            --work-dir "$RUNNER_TEMP/px4-runtime-work-v1.16-jazzy-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create trusted build manifest
        run: |
          product_version="$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)"
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir build-manifests \
            --product xgc2-px4-sitl-116 \
            --product-version "$product_version" \
            --distribution noble \
            --architecture "${{ matrix.arch }}" \
            --source-sha "$GITHUB_SHA" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: px4-sitl-runtime-debs-v1.16-jazzy-${{ matrix.arch }}
          path: |
            debs/*.deb
            build-manifests/*.json
          retention-days: 14
          include-hidden-files: true
